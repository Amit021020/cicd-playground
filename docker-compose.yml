version: '3.9'

services:

  app:
    build: .
    container_name: node-app

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - mongo

    restart: always

  mongo:
    image: mongo:7
    container_name: cicd-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    restart: always

volumes:
  mongo-data: