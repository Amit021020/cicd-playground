services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-app
    ports:
      - 3000:3000
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/cicd
    restart: always

  mongodb:
    image: mongo:6
    container_name: mongo-db
    ports:
      - "27018:27017"
    env_file:
      - .env
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data: